---
- name: Grafana - Add repo file
  become: true
  ansible.builtin.template:
    src: grafana.repo.j2
    dest: "{{ repo_path }}/grafana.repo"
    mode: '644'
  tags: monitoring

- name: Grafana - Install package
  become: true
  ansible.builtin.yum:
    name:
      - grafana
    state: latest
  notify:
    - Start grafana
  tags: monitoring

- name: Flush handlers
  meta: flush_handlers

- name: Grafana - Add datasource
  community.grafana.grafana_datasource:
    name: Prometheus
    grafana_url: http://localhost:3000
    grafana_user: {{ grafana_user }}
    grafana_password: {{ grafana_password }} 
    ds_type: prometheus
    ds_url: http://localhost:9090
    access: proxy
    state: present
  register: result
  failed_when: result.rc != 0 and result.rc != 1
  changed_when: result.rc == 0
  tags: monitoring

- name: Grafana - Copy Dashboard
  ansible.builtin.copy:
    src: files/node-exporter-full.json
    dest: "{{ tmp_path }}/node-exporter-full.json"
  tags: monitoring

- name: Grafana - Import dashboard
  community.grafana.grafana_dashboard:
    grafana_url: http://localhost:3000
    grafana_user: {{ grafana_user }}
    grafana_password: {{ grafana_password }}
    state: present
    overwrite: true
    path: "{{ tmp_path }}/node-exporter-full.json"
  tags: monitoring

